<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/css/output.css">
</head>

<body class="bg-gray-200">
    <header>
        <nav class="flex py-2 px-4 items-center gap-10 bg-[#284636]">
            <a href="./index.html">
                <div id="logotipo" class="flex flex-row items-center gap-2.5 text-[#A9945F] font-bold ">
                    <img src="./src/img/LogoMonoColor.png" alt="Logo de la Pagina" width="50px" height="50px">
                    <span>BIOsalud</span>
                </div>
            </a>
            <div class="w-full flex justify-end text-amber-50">
                <ul class="flex flex-row gap-3">
                    <a href="#">Reuniones</a>
                    <a href="#">Grupos</a>
                    <a href="#">Lugares</a>
                    <a href="perfil.html">Perfil</a>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section id="top-banner">
            <div class="bg-white w-full h-1/3 flex flex-col md:flex-row justify-center items-end shadow-xl">
                <div class="flex flex-col items-center justify-center w-full py-10 
                        md:w-fit md:items-end md:flex-row md:px-10">
                    <img src="./src/img/perfil.png" alt="Logo de la pagina" class="w-64 h-64">
                    <div class="px-10 py-8 flex flex-col gap-4 md:gap-2 text-xl font-light text-gray-800">
                        <div class="flex items-center gap-3">
                            <svg class="w-8 h-8 md:w-6 md:h-6" viewBox="0 0 24 24" class="text-gray-700">
                                <path fill="currentColor"
                                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                            </svg>
                            <span class="md:text-2xs">Ciudad Ciudad</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <svg class="w-8 h-8 md:w-6 md:h-6" viewBox="0 0 24 24" class="text-gray-700">
                                <path fill="currentColor"
                                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            </svg>
                            <span class="md:text-xs">15 Amigos</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <svg class="w-8 h-8 md:w-6 md:h-6" viewBox="0 0 24 24" class="text-gray-700">
                                <path fill="currentColor"
                                    d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z" />
                            </svg>
                            <span class="md:text-sm">Miembro desde: 2025</span>
                        </div>
                    </div>
                </div>
                <button class="bg-[#A9945F] text-[#1e382a] w-fit px-6 py-3 mt-4 rounded-full font-semibold
                        hover:bg-[#1e382a] hover:text-[#A9945F] hover:scale-105
                        transition-all duration-300 shadow-lg m-10">
                    Editar Perfil
                </button>
            </div>
        </section>
        <section id="acciones-y-companeros"
            class="flex flex-col md:flex-row gap-6 mx-auto max-w-[900px] px-4 md:px-10 my-8">
            <div class="flex flex-col gap-3 w-full md:w-[180px] shrink-0 justify-center">
                <a href="#"
                    class="bg-white border border-[#284636] text-[#284636] flex items-center justify-start gap-2 py-1.5 px-4 rounded-full hover:bg-[#284636] hover:text-white transition-colors w-full text-xs font-medium">
                    <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z"
                            clip-rule="evenodd" />
                    </svg>
                    <span>Crear Reunión</span>
                </a>
                <a href="#"
                    class="bg-white border border-[#284636] text-[#284636] flex items-center justify-start gap-2 py-1.5 px-4 rounded-full hover:bg-[#284636] hover:text-white transition-colors w-full text-xs font-medium">
                    <svg class="w-3.5 h-3.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
                    </svg>
                    <span>Crear Grupo</span>
                </a>
                <a href="#"
                    class="bg-white border border-[#284636] text-[#284636] flex items-center justify-start gap-2 py-1.5 px-4 rounded-full hover:bg-[#284636] hover:text-white transition-colors w-full text-xs font-medium">
                    <svg class="w-3 h-3 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />
                        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" />
                    </svg>
                    <span>Agregar Lugar</span>
                </a>
            </div>

            <!-- Columna Derecha: Compañeros -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 px-6 flex-1 overflow-visible">
                <h3 class="text-[#284636] font-bold text-sm mb-4 text-center">Compañeros</h3>
                <div class="flex flex-row flex-wrap gap-4 items-start justify-center">

                    <div class="flex flex-col items-center gap-1 cursor-pointer">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Persona"
                            class="w-[60px] h-[72px] object-cover bg-gray-100">
                        <span class="text-[9px] text-gray-600 font-medium">Nombre Completo</span>
                    </div>

                    <div class="flex flex-col items-center gap-1 cursor-pointer">
                        <img src="https://i.pravatar.cc/150?img=12" alt="Persona"
                            class="w-[60px] h-[72px] object-cover bg-gray-100">
                        <span class="text-[9px] text-gray-600 font-medium">Nombre Completo</span>
                    </div>

                    <div class="flex flex-col items-center gap-1 cursor-pointer">
                        <img src="https://i.pravatar.cc/150?img=13" alt="Persona"
                            class="w-[60px] h-[72px] object-cover bg-gray-100">
                        <span class="text-[9px] text-gray-600 font-medium">Nombre Completo</span>
                    </div>

                    <!-- Daniel Orozco (Con Tooltip) -->
                    <div class="flex flex-col items-center gap-1 cursor-pointer group relative">
                        <img src="https://i.pravatar.cc/150?img=33" alt="Daniel Orozco"
                            class="w-[60px] h-[72px] object-cover bg-gray-100">
                        <span class="text-[9px] text-gray-600 font-medium">Nombre Completo</span>
                        <div
                            class="absolute -right-10 top-1/2 -translate-y-1/2 bg-[#22c55e] text-white text-[11px] font-semibold px-2.5 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity z-10 whitespace-nowrap pointer-events-none">
                            Daniel Orozco
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- Divider Reuniones Asistidas -->
        <div class="flex items-center mx-auto max-w-[1024px] px-4 md:px-10 mt-14 mb-16 opacity-70">
            <div class="flex-grow border-t-[1.5px] border-gray-400"></div>
            <span class="mx-6 text-gray-500 font-serif text-[1.25rem] tracking-wide">Reuniones Asistidas</span>
            <div class="flex-grow border-t-[1.5px] border-gray-400"></div>
        </div>

    </main>
</body>

</html>
